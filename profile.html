<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Nest · 我的</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="bg-shape bg-shape-b"></div>

      <main class="page-shell">
        <section class="page-hero">
          <div>
            <p class="eyebrow">个人中心</p>
            <h1 class="page-title">你的找房节奏</h1>
            <p class="page-text">把收藏、提醒、看房安排和预算偏好放在一起，减少遗漏和重复比较。</p>
          </div>
          <a class="page-back" href="./index.html">返回首页</a>
        </section>

        <section class="section profile-layout">
          <div class="profile-main">
            <div class="profile-card">
              <div class="avatar-badge">LQ</div>
              <div>
                <h2>Leqi</h2>
                <p>Graduate Student · Fall Move-in</p>
              </div>
            </div>

            <div class="detail-card">
              <div class="section-heading compact">
                <p class="section-kicker">当前偏好</p>
                <h2>已保存的找房条件</h2>
              </div>
              <div class="result-tags">
                <span>$600-$900</span>
                <span>步行 15 分钟内</span>
                <span>安静社区</span>
                <span>接受合租</span>
              </div>
            </div>

            <div class="saved-grid">
              <article class="saved-card">
                <strong>收藏房源</strong>
                <span>12 套</span>
                <p>其中 4 套今天有新动态</p>
              </article>
              <article class="saved-card mint-card">
                <strong>转租提醒</strong>
                <span>8 条</span>
                <p>2 条符合你的预算和入住时间</p>
              </article>
              <article class="saved-card peach-card">
                <strong>已预约看房</strong>
                <span>3 次</span>
                <p>下次预约在周二 4:30 PM</p>
              </article>
            </div>
          </div>

          <aside class="profile-side">
            <div class="schedule-card sticky-panel">
              <p class="section-kicker">本周安排</p>
              <div class="schedule-list">
                <div><strong>Mon</strong><span>查看 North Loop 新评价</span></div>
                <div><strong>Tue</strong><span>South Gate 视频看房</span></div>
                <div><strong>Thu</strong><span>联系 2B1B 转租房东</span></div>
              </div>
            </div>
          </aside>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="底部导航">
        <a class="nav-item" href="./index.html">首页</a>
        <a class="nav-item" href="./search.html">找房</a>
        <a class="nav-item" href="./detail.html">详情</a>
        <a class="nav-item" href="./community.html">社区</a>
        <a class="nav-item active" href="./profile.html">我的</a>
      </nav>
    </div>
  </body>
</html>
